name: Build and publish to NPM and GitHub Packages

on:
  push:
    branches:
      - test-main

jobs:
  testAndBuildAndPublish:
    permissions: write-all
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.13.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Needed for semantic-release to work in case tags have been modified manually (for example when testing)

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup node version needed for build
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - run: make prepare

      - run: make build

      - name: Remove scope from package.json name
        run: |
          jq '. += { name: "hcloud-sdk" }' package.json > package.publish.json
          mv package.publish.json package.json

      - run: make preparePublish

      - name: Setup node for semantic-release
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name:
          Publish package and generate changelog with semantic-release. The specific tasks executed by this package are defined in release.config.js
        run: pnpx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          TELEGRAM_BOT_ID: ${{ secrets.TELEGRAM_BOT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      # ── Publish to GitHub Packages (legacy) ───────────────────────────────
      - name: Patch build/package.json for GitHub Packages
        run: |
          jq '. += { name: "@moovit-sp-gmbh/hcloud-sdk", publishConfig: { registry: "https://npm.pkg.github.com" }}' build/package.json > build/package.publish.json
          mv build/package.publish.json build/package.json

      - name: Setup node for GitHub Packages publish
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://npm.pkg.github.com"
          scope: "@moovit-sp-gmbh"

      - name: Publish to GitHub Packages (legacy)
        run: cd build && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
