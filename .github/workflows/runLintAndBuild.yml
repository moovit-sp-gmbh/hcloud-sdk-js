name: Run linting and build

on:
  push:
    branches-ignore:
      - staging
      - main

jobs:
  run:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.18.0]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Prepare packages
        run: make prepare

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Check for changes from formatting
        run: git diff --quiet HEAD || { echo "Diff found in \n$(git status -s)" && exit 1; }
