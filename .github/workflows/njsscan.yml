name: njsscan
on:
  merge_group:
    branches:
      - main
      - dev
  push:
    branches:
      - test-main
      - dev
  pull_request:
    branches:
      - main
      - dev
    types: 
      - ready_for_review
      - review_requested

jobs:
  njsscan:
    runs-on: ubuntu-latest
    name: njsscan check
    steps:
      - name: Checkout the code
        uses: actions/checkout@v2
      - name: nodejsscan scan
        id: scan
        run: make scan 