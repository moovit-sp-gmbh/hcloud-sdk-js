name: Build and publish to NPM and GitHub Packages

on:
  push:
    branches:
      - main

jobs:
  testAndBuildAndPublish:
    permissions: write-all
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.18.0]
        pnpm-version: [11.7.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Needed for semantic-release to work in case tags have been modified manually (for example when testing)

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ matrix.pnpm-version }}

      - name: Setup node version needed for build
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - run: make prepare

      - run: make lint

      - run: make build

      - name: Check for changes from formatting
        run: git diff --quiet HEAD || { echo "Diff found in \n$(git status -s)" && exit 1; }

      - run: make preparePublish

      - name: Prepare npmjs build (remove scope from name)
        run: |
          jq '.name = "hcloud-sdk"' build/package.json > build/pkg.tmp.json
          mv build/pkg.tmp.json build/package.json

      - name: Prepare GitHub Packages build
        run: |
          cp -r build build-github
          jq '.name = "@moovit-sp-gmbh/hcloud-sdk" | .publishConfig = {"registry": "https://npm.pkg.github.com"}' \
            build/package.json > build-github/package.json

      - name: Setup node for semantic-release
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Publish to npmjs and GitHub Packages via semantic-release
        run: pnpx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPMJS_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPMJS_NPM_CONFIG_REGISTRY: "https://registry.npmjs.org"
          GITHUB_NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_NPM_CONFIG_REGISTRY: "https://npm.pkg.github.com/"
          TELEGRAM_BOT_ID: ${{ secrets.TELEGRAM_BOT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
